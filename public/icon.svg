<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF7E5F" />
      <stop offset="40%" stop-color="#ED8F03" />
      <stop offset="100%" stop-color="#7B2CBF" />
    </linearGradient>
    
    <!-- Glow Filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Strong Glow for Text -->
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- App Icon Background -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />

  <!-- Clock Outer Ring -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="rgba(255, 255, 255, 0.4)" stroke-width="6" />
  
  <!-- Clock Dots (Minutes) -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="rgba(255, 255, 255, 0.2)" stroke-width="4" stroke-dasharray="8 23.4" />

  <!-- Clock Numbers -->
  <g fill="white" font-family="system-ui, sans-serif" font-weight="800" font-size="44" text-anchor="middle" dominant-baseline="central">
    <text x="256" y="90">12</text>
    <text x="338" y="112">1</text>
    <text x="400" y="174">2</text>
    <text x="422" y="256">3</text>
    <text x="400" y="338">4</text>
    <text x="338" y="400">5</text>
    <text x="256" y="422">6</text>
    <text x="174" y="400">7</text>
    <text x="112" y="338">8</text>
    <text x="90" y="256">9</text>
    <text x="112" y="174">10</text>
    <text x="174" y="112">11</text>
  </g>

  <!-- Clock Hands -->
  <g stroke="white" stroke-linecap="round">
    <line x1="256" y1="256" x2="160" y2="190" stroke-width="12" /> <!-- Hour -->
    <line x1="256" y1="256" x2="210" y2="256" stroke-width="8" />  <!-- Minute -->
  </g>

  <!-- Rocket Boost Trail -->
  <path d="M 0 512 L 280 280 L 320 320 Z" fill="rgba(255, 255, 255, 0.15)" filter="url(#glow)"/>
  <path d="M 50 512 L 290 290 L 310 310 Z" fill="rgba(255, 255, 255, 0.3)" filter="url(#glow)"/>
  
  <!-- Flying Yen & Multiplier Embellishments -->
  <g fill="#FFD700" font-family="system-ui, sans-serif" font-weight="900" filter="url(#strongGlow)">
    <text x="180" y="340" font-size="56" transform="rotate(-25 180 340)">1.25</text>
    <text x="110" y="410" font-size="40">¥</text>
    <text x="250" y="410" font-size="28">¥</text>
    <text x="160" y="450" font-size="20">¥</text>
    <text x="80"  y="360" font-size="24">¥</text>
    <text x="220" y="290" font-size="22">¥</text>
    <!-- Little glow stars -->
    <circle cx="140" cy="300" r="3" fill="white" />
    <circle cx="280" cy="380" r="2" fill="white" />
    <circle cx="100" cy="460" r="4" fill="white" />
  </g>

  <!-- The Rocket -->
  <g transform="translate(320, 190) rotate(45)">
    <!-- Main Body -->
    <path d="M 0 -80 C 30 -30 30 50 0 70 C -30 50 -30 -30 0 -80 Z" fill="#E2E8F0" />
    <path d="M 0 -80 C 15 -30 15 50 0 70 Z" fill="#FFFFFF" /> <!-- Highlight -->
    
    <!-- Fins -->
    <path d="M -20 30 L -50 70 L -10 60 Z" fill="#94A3B8" />    <!-- Left Fin -->
    <path d="M 20 30 L 50 70 L 10 60 Z" fill="#94A3B8" />      <!-- Right Fin -->
    <path d="M 0 40 L -10 75 L 10 75 Z" fill="#CBD5E1" />       <!-- Center Fin -->
    
    <!-- Window -->
    <circle cx="0" cy="0" r="18" fill="#3B82F6" stroke="#1E293B" stroke-width="6" />
    <circle cx="-5" cy="-5" r="5" fill="#60A5FA" /> <!-- Window Highlight -->
    
    <!-- Flame -->
    <path d="M -15 65 C -25 100 0 120 0 120 C 0 120 25 100 15 65 Z" fill="#F97316" filter="url(#glow)" />
    <path d="M -8 68 C -15 90 0 100 0 100 C 0 100 15 90 8 68 Z" fill="#FCD34D" />
  </g>

  <!-- Center Pin of Clock -->
  <circle cx="256" cy="256" r="12" fill="#1E293B" />
  <circle cx="256" cy="256" r="6" fill="#FFFFFF" />
</svg>
